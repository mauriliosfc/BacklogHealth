<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Backlog Health Dashboard</title>
<script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="header">
  <div>
    <h1>📋 Backlog Health</h1>
    <div class="subtitle">Azure DevOps · {{ORG}}</div>
  </div>
  <div class="refresh-bar">
    <div class="header-utils">
      <button class="btn-theme" id="btnTheme" onclick="toggleTheme()" title="Tema claro">☀️</button>
      <button class="btn-theme" onclick="location.href='/settings'" title="Configurações">⚙️</button>
    </div>
    <div class="header-divider"></div>
    <div class="header-actions">
      <button class="btn-daily" id="btnDaily" onclick="openDaily()">📅 Apresentar daily</button>
      <button class="btn-refresh" id="btnRefresh" onclick="doRefresh()">↻ Atualizar</button>
      <div class="header-meta">
        <div class="timer" id="timer">Próximo refresh em 5:00</div>
        <div class="update" id="lastUpdate">Atualizado em {{LAST_UPDATE}}</div>
      </div>
    </div>
  </div>
</div>
<div id="content">
{{CARDS}}
</div>

<div id="detail-modal" class="modal-overlay" onclick="closeDetails(event)">
  <div class="modal-box">
    <div class="modal-head">
      <div>
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-sub" id="modal-sub"></div>
      </div>
      <div class="modal-actions">
        <button class="modal-refresh" type="button" id="btnRefreshDetail" onclick="loadDetailData(_detailProject, _detailSprints)" title="Atualizar dados">↻</button>
        <button class="modal-maximize" type="button" id="btnMaximize" onclick="toggleMaximize()" title="Maximizar">⤢</button>
        <button class="modal-close" type="button" onclick="closeDetailsBtn()">✕</button>
      </div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div id="daily-modal" class="daily-overlay" onkeydown="handleDailyKey(event)">
  <div class="daily-box" id="daily-box">
    <div class="daily-head">
      <div class="daily-head-title">📅 Daily Standup</div>
      <div class="daily-head-actions">
        <button class="modal-maximize" id="btnDailyMax" onclick="toggleDailyMaximize()" title="Expandir">⤢</button>
        <button class="modal-close" onclick="closeDaily()" title="Fechar">✕</button>
      </div>
    </div>
    <div class="daily-carousel-wrap">
      <div class="daily-track" id="daily-track"></div>
    </div>
    <div class="daily-nav">
      <button class="daily-nav-btn" id="btnDailyPrev" onclick="dailyPrev()">← Anterior</button>
      <div class="daily-counter" id="daily-counter"></div>
      <button class="daily-nav-btn" id="btnDailyNext" onclick="dailyNext()">Próximo →</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
